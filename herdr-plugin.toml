id = "riq0h.tab-process-name"
name = "Tab Process Name"
version = "0.2.0"
min_herdr_version = "0.7.0"
description = "Label each tab with its foreground process name. Pairs with tab-blank-number to drop herdr's default numeric label."
platforms = ["linux", "macos"]

[[actions]]
id = "sync"
title = "Sync tab process names now"
command = ["node", "sync.mts"]

[[events]]
on = "tab.created"
command = ["node", "sync.mts"]

[[events]]
on = "tab.focused"
command = ["node", "sync.mts"]

[[events]]
on = "tab.moved"
command = ["node", "sync.mts"]

[[events]]
on = "pane.created"
command = ["node", "sync.mts"]

[[events]]
on = "pane.closed"
command = ["node", "sync.mts"]

[[events]]
on = "pane.exited"
command = ["node", "sync.mts"]

[[events]]
on = "pane.focused"
command = ["node", "sync.mts"]

[[events]]
on = "pane.moved"
command = ["node", "sync.mts"]

[[events]]
on = "pane.agent_status_changed"
command = ["node", "sync.mts"]

[[events]]
on = "workspace.focused"
command = ["node", "sync.mts"]
